<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting</title>
</head>
<body>

<h2>HTML Text Formatting Tags</h2>

<table border="1">
<tr>
    <th>Tag</th>
    <th>Example</th>
</tr>
<tr>
    <td>&lt;b&gt;</td>
    <td><b>Bold Text</b></td>
</tr>
<tr>
    <td>&lt;i&gt;</td>
    <td><i>Italic Text</i></td>
</tr>
<tr>
    <td>&lt;u&gt;</td>
    <td><u>Underline</u></td>
</tr>
<tr>
    <td>&lt;mark&gt;</td>
    <td><mark>Highlighted</mark></td>
</tr>
</table>

</body>
</html>
